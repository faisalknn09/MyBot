discord.bot.token=${DISCORD_BOT_TOKEN}
openrouter.api.key=${OPENROUTER_API_KEY}
weather.api.key=${WEATHER_API_KEY}
discord.bot.prefix=!
discord.bot.status=Listening for commands
discord.bot.ignore-bots=true

# Spring
spring.application.name=MyBot
spring.main.keep-alive=true
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=16
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=bot-async-

# Logging
logging.level.root=INFO
logging.level.com.example.MyBot=DEBUG
logging.level.net.dv8tion.jda=WARN